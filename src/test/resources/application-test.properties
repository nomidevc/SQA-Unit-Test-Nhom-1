# H2 In-Memory Database configuration for Testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Ignore mail sending in test
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test

# JWT
app.jwt.secret=test-secret-key-for-testing-only-must-be-at-least-256-bits
app.jwt.expiration-ms=3600000

# Server
server.port=8080

# Mock external config properties for test
ghn.shop.id=123456
ghn.api.token=test_token
ghn.pick.district.id=1454
ghn.api.url=https://online-gateway.ghn.vn/shiip/public-api

